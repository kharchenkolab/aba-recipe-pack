    scope: system
    status: published

  - name: harmony
    version: "latest"
    archetype: r_package
    domain_tags: [single-cell, integration, batch-correction, harmony, r, seurat]
    summary: Harmony R package — fast linear batch integration; RunHarmony() plugs directly into the Seurat workflow. See the harmony-integration recipe.
    provisioning: {r: {source: cran, package: harmony, library: harmony}}
    source: cran
    scope: system
    status: published

  - name: scry
    version: "latest"
    archetype: r_package
    domain_tags: [single-cell, feature-selection, deviance, bioconductor, r]
    summary: Bioconductor scry — deviance-based feature selection (devianceFeatureSelection) on raw counts, called from Python via rpy2. See the bp-feature-selection recipe.
    provisioning: {r: {source: bioconductor, package: scry, library: scry}}
    source: bioconductor
    scope: system
    status: published
