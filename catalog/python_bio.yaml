    status: published

  - name: omnipath
    version: "latest"
    archetype: library
    domain_tags: [single-cell, prior-knowledge, signaling, pathway, gene-set, database]
    summary: Python client for the OmniPath prior-knowledge database (signaling, TF-target, pathway gene sets) — supplies networks/regulons to decoupler. See the bp-gsea-pathway recipe.
    provisioning: {pip: ["omnipath"]}
    import_name: omnipath
    scope: system
    status: published

  - name: scrublet
    version: "latest"
    archetype: library
    domain_tags: [single-cell, quality-control, doublet-detection]
    summary: Simulation-based doublet detection for droplet scRNA-seq (also wrapped as sc.pp.scrublet). See the bp-quality-control recipe.
    provisioning: {pip: ["scrublet"]}
    import_name: scrublet
    scope: system
    status: published

  - name: scvelo
    version: "latest"
    archetype: library
    domain_tags: [single-cell, rna-velocity, dynamics, trajectory]
    summary: RNA velocity (stochastic/dynamical models) from spliced + unspliced counts to infer directional cell-state dynamics. See the bp-rna-velocity recipe.
    provisioning: {pip: ["scvelo"]}
    import_name: scvelo
    scope: system
    status: published

  - name: palantir
    version: "latest"
    archetype: library
    domain_tags: [single-cell, trajectory, pseudotime, cell-fate, differentiation]
