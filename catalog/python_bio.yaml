  - name: scib-metrics
    version: "latest"
    archetype: library
    domain_tags: [single-cell, integration, benchmarking, metrics]
    summary: Batch-correction vs bio-conservation benchmarking metrics (scIB) to compare integration methods. See the bp-data-integration recipe.
    provisioning: {pip: ["scib-metrics"]}
