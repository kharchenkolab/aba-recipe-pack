    import_name: milopy
    scope: system
    status: published

  # --- single-cell R frameworks (on-demand; heavy frameworks are NOT pre-baked) ---
  - name: Seurat
    version: "latest"
    archetype: r_package
    domain_tags: [scrna-seq, single-cell, clustering, integration, seurat, r, marker-genes]
    summary: The Seurat R toolkit — QC, SCTransform/log normalization, PCA, neighbors, clustering, UMAP, marker DE and anchor/Harmony integration on Seurat objects. CRAN binary via PPM on first install. See the seurat-scrna recipe.
