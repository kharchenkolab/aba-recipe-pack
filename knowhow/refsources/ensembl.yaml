# Ensembl FTP — genome FASTA + annotation for vertebrates, and (via the
# Ensembl Genomes / EBI mirrors) selected invertebrate / fungal / plant species.
# kind: manifest → an explicit asset list (role × organism × assembly → url).
#
# Release notes (verified 2026-06-28):
#   - Vertebrates (human, mouse, rat, zebrafish) are on the main Ensembl
#     vertebrate release 116. Their annotation files carry "116" in the name.
#   - Human + mouse genomes use `.dna.primary_assembly.` (no haplotype/patch
#     scaffolds); all other species use `.dna.toplevel.`.
#   - Invertebrates / fungi (fly, worm, yeast) ship on the Ensembl *Genomes*
#     release cadence even on ftp.ensembl.org — their annotation carries "63"
#     in the name (NOT 116). FASTA files (genome/cdna/cds/pep) never carry the
#     release number, only the assembly, so those are release-agnostic.
#   - Arabidopsis is served from Ensembl Plants via the EBI mirror
#     (ftp.ebi.ac.uk/ensemblgenomes/pub/plants/release-63), assembly TAIR10.
#
# To bump a release: change the release number in the `version` tag AND in the
# URLs (the directory segment `release-N` and, for gtf/gff, the `.N.` infix).
# Re-verify the assembly string — Ensembl re-bases assemblies between releases
# (rat moved mRatBN7.2 → GRCr8; fly BDGP6.32 → BDGP6.54).
provider: ensembl
description: Ensembl genome FASTA (dna/cdna/cds/pep) + GTF/GFF3 annotation.
kind: manifest
homepage: https://www.ensembl.org/info/data/ftp/index.html
assets:
  # ── Homo sapiens / GRCh38 (release 116) ─────────────────────────────────
  - role: genome
    organism: homo_sapiens
    assembly: GRCh38
    version: ensembl-116
    url: https://ftp.ensembl.org/pub/release-116/fasta/homo_sapiens/dna/Homo_sapiens.GRCh38.dna.primary_assembly.fa.gz
  - role: transcriptome
    organism: homo_sapiens
    assembly: GRCh38
    version: ensembl-116
    url: https://ftp.ensembl.org/pub/release-116/fasta/homo_sapiens/cdna/Homo_sapiens.GRCh38.cdna.all.fa.gz
  - role: cds
    organism: homo_sapiens
    assembly: GRCh38
    version: ensembl-116
    url: https://ftp.ensembl.org/pub/release-116/fasta/homo_sapiens/cds/Homo_sapiens.GRCh38.cds.all.fa.gz
  - role: protein
    organism: homo_sapiens
    assembly: GRCh38
    version: ensembl-116
    url: https://ftp.ensembl.org/pub/release-116/fasta/homo_sapiens/pep/Homo_sapiens.GRCh38.pep.all.fa.gz
  - role: gtf
    organism: homo_sapiens
    assembly: GRCh38
    version: ensembl-116
    url: https://ftp.ensembl.org/pub/release-116/gtf/homo_sapiens/Homo_sapiens.GRCh38.116.gtf.gz
  - role: gff
    organism: homo_sapiens
    assembly: GRCh38
    version: ensembl-116
    url: https://ftp.ensembl.org/pub/release-116/gff3/homo_sapiens/Homo_sapiens.GRCh38.116.gff3.gz

